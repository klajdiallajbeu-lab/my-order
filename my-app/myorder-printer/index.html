<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8" />
<title>MYORDER PRINTER</title>

<style>
  :root {
    --blue: #2563eb;
    --blue-dark: #1d4ed8;
    --ink: #0f172a;
    --muted: #64748b;
    --line: #e6ecf5;
    --bg: #eef2f9;
    --ok: #16a34a;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 22px 26px 26px;
    background: var(--bg);
    color: var(--ink);
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
  }

  /* ---------- HEADER ---------- */

  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 22px;
  }

  .brand { display: flex; align-items: center; gap: 16px; }

  .brand-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 62px;
    height: 62px;
    border-radius: 16px;
    background: #fff;
    box-shadow: 0 3px 12px rgba(15, 23, 42, 0.08);
    font-size: 30px;
  }

  .brand h1 {
    margin: 0;
    font-size: 25px;
    font-weight: 800;
    letter-spacing: 0.3px;
  }

  .brand p {
    margin: 3px 0 0;
    color: var(--muted);
    font-size: 13px;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 24px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #fff;
    font-size: 15px;
    font-weight: 700;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #cbd5e1;
  }

  .status-pill.online .dot { background: var(--ok); }
  .status-pill.online     { color: var(--ok); }
  .status-pill.offline .dot { background: #dc2626; }
  .status-pill.offline    { color: #dc2626; }

  /* ---------- GRID ---------- */

  .grid {
    display: grid;
    grid-template-columns: 1.35fr 0.9fr 1.25fr;
    gap: 18px;
    margin-bottom: 18px;
  }

  .card {
    padding: 22px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: #fff;
    box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
  }

  .card h2 {
    margin: 0 0 18px;
    font-size: 17px;
    font-weight: 700;
  }

  label.fl {
    display: block;
    margin-bottom: 7px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
  }

  input[type="text"], select {
    width: 100%;
    height: 44px;
    padding: 0 13px;
    border: 1px solid #dde5f0;
    border-radius: 9px;
    background: #fff;
    color: var(--ink);
    font-size: 15px;
    font-family: inherit;
    outline: 0;
  }

  input[type="text"]:focus, select:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
  }

  .btn-row { display: flex; gap: 12px; margin-top: 18px; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    height: 44px;
    padding: 0 24px;
    border: 1px solid transparent;
    border-radius: 9px;
    font-size: 14.5px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }

  .btn.primary { background: var(--blue); color: #fff; }
  .btn.primary:hover { background: var(--blue-dark); }

  .btn.light {
    background: #fff;
    border-color: #dde5f0;
    color: var(--ink);
  }

  .btn.light:hover { background: #f7f9fc; }

  .btn.outline {
    background: #fff;
    border-color: var(--blue);
    color: var(--blue);
    height: 40px;
    padding: 0 18px;
    font-size: 13.5px;
  }

  .btn:disabled { opacity: 0.55; cursor: default; }

  .msg {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-top: 20px;
    font-size: 14px;
    font-weight: 600;
  }

  .msg.ok  { color: var(--ok); }
  .msg.err { color: #dc2626; }
  .msg.wait { color: var(--muted); }

  /* biznesi */
  .biz { text-align: center; }
  .biz h2 { text-align: left; }

  .biz-name {
    margin: 12px 0 26px;
    font-size: 22px;
    font-weight: 800;
  }

  .biz-icon { font-size: 62px; line-height: 1; }

  /* printerat */
  .field { margin-bottom: 15px; }

  .summary {
    margin-top: 18px;
    padding: 15px 16px;
    border-radius: 11px;
    background: #f4f7fc;
  }

  .summary-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 0;
    font-size: 13.5px;
  }

  .summary-row b { min-width: 74px; font-weight: 600; color: var(--muted); }
  .summary-row span { font-weight: 600; }

  /* ---------- POROSITE ---------- */

  .orders h2 {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .order {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 6px;
    border-bottom: 1px solid #f1f5f9;
  }

  .order:last-child { border-bottom: 0; }

  .order-icon { font-size: 19px; }

  .order-name { flex: 1 1 auto; font-weight: 600; }

  .order-time { color: var(--muted); font-size: 13px; }

  .empty {
    padding: 26px 6px;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>

<body>

  <!-- HEADER -->
  <div class="top">
    <div class="brand">
      <div class="brand-logo">🖨️</div>
      <div>
        <h1>MYORDER PRINTER</h1>
        <p>Printer Agent v1.0.0</p>
      </div>
    </div>

    <div id="statusPill" class="status-pill offline">
      <span class="dot"></span>
      <span id="statusText">Offline</span>
    </div>
  </div>

  <!-- GRID -->
  <div class="grid">

    <!-- PRINTER KEY -->
    <section class="card">
      <h2>Printer Key</h2>

      <label class="fl" for="printerKey">Printer Key</label>
      <input id="printerKey" type="text" placeholder="MYORDER-000000" autocomplete="off" />

      <div class="btn-row">
        <button id="btnConnect" class="btn primary">Lidhu</button>
        <button id="btnTest" class="btn light">Test Print</button>
      </div>

      <div id="connectMsg" class="msg wait">Vendos Printer Key dhe kliko "Lidhu".</div>
    </section>

    <!-- BIZNESI -->
    <section class="card biz">
      <h2>Biznesi</h2>
      <div id="bizName" class="biz-name">—</div>
      <div class="biz-icon">🏪</div>
    </section>

    <!-- PRINTERAT -->
    <section class="card">
      <h2>Printerat</h2>

      <div class="field">
        <label class="fl" for="pBanak">Printer Banak</label>
        <select id="pBanak"></select>
      </div>

      <div class="field">
        <label class="fl" for="pKuzhine">Printer Kuzhinë</label>
        <select id="pKuzhine"></select>
      </div>

      <div class="field">
        <label class="fl" for="pFature">Printer Faturë</label>
        <select id="pFature"></select>
      </div>

      <button id="btnSavePrinters" class="btn outline">💾 Ruaj Printerat</button>

      <div class="summary">
        <div class="summary-row"><span>🖨️</span><b>Banak:</b><span id="sBanak">—</span></div>
        <div class="summary-row"><span>🍳</span><b>Kuzhinë:</b><span id="sKuzhine">—</span></div>
        <div class="summary-row"><span>🧾</span><b>Faturë:</b><span id="sFature">—</span></div>
      </div>
    </section>
  </div>

  <!-- POROSITE E FUNDIT -->
  <section class="card orders">
    <h2>📋 Porositë e fundit</h2>
    <div id="ordersList">
      <div class="empty">Nuk ka porosi ende.</div>
    </div>
  </section>

  <script src="./renderer.js"></script>
</body>
</html>
